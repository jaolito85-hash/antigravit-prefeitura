<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Voz Ativa - Ivaté</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/static/icons/icon-512.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #050507;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: #111217;
            border: 1px solid #23252e;
            border-radius: 16px;
            padding: 40px 32px;
            text-align: center;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .login-logo img {
            height: 36px;
            width: 36px;
        }

        .login-logo span {
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
        }

        .login-subtitle {
            color: #8b949e;
            font-size: 0.85rem;
            margin-bottom: 32px;
        }

        .login-subtitle strong {
            color: #059669;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px;
            background: #0b0c10;
            border: 1px solid #23252e;
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #059669;
        }

        .form-group input::placeholder {
            color: #4a4d57;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: #059669;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            background: #047857;
        }

        .error-msg {
            background: #ef444420;
            color: #ef4444;
            border: 1px solid #ef444455;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-text {
            color: #4a4d57;
            font-size: 0.7rem;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <img src="/static/logo.png" alt="Node Data">
                <span>Node Data</span>
            </div>
            <p class="login-subtitle">Painel <strong>Voz Ativa</strong> - Ivaté-PR</p>

            {% if erro %}
            <div class="error-msg">
                <i class="ri-error-warning-line"></i> {{ erro }}
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label>Usuário</label>
                    <input type="text" name="usuario" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" name="senha" placeholder="Digite sua senha" required>
                </div>
                <button type="submit" class="login-btn">
                    <i class="ri-login-box-line"></i> Entrar
                </button>
            </form>

            <p class="footer-text">Acesso restrito a gestores municipais</p>
        </div>
    </div>
</body>
</html>
